<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VN Boost · Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0a0a0c; --panel:#15151a; --panel2:#1c1c23; --line:#2a2a33; --text:#f2f3f7;
    --muted:#8b8d99; --red:#e10600; --red2:#ff2a25; --green:#28c840; --yellow:#febc2e; }
  body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); padding:28px; }
  h1 { font-size:22px; font-weight:800; } h1 span { color:var(--red2); }
  .muted { color:var(--muted); font-size:13px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px; margin-top:18px; }
  input, select { font-family:'Poppins',sans-serif; background:var(--panel2); border:1px solid var(--line);
    color:var(--text); padding:10px 12px; border-radius:9px; font-size:13px; outline:none; }
  input:focus, select:focus { border-color:var(--red); }
  button { font-family:'Poppins',sans-serif; cursor:pointer; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); padding:9px 14px; border-radius:9px; font-size:12px; font-weight:600; transition:.15s; }
  button:hover { border-color:var(--red); }
  .btn-primary { background:linear-gradient(135deg,var(--red),#a30400); border-color:var(--red); color:#fff; font-weight:700; }
  table { width:100%; border-collapse:collapse; margin-top:8px; font-size:12.5px; }
  th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  code { background:#0d0d10; padding:3px 7px; border-radius:6px; font-size:12px; color:#e7e9f0; }
  .tag { font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; }
  .tag-active { background:rgba(40,200,64,.15); color:var(--green); }
  .tag-revoked { background:rgba(225,6,0,.15); color:var(--red2); }
  .tag-unbound { background:rgba(254,188,46,.13); color:var(--yellow); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .actions button { padding:6px 9px; font-size:11px; margin-right:4px; }
  .hidden { display:none; }
  .hwid { max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:inline-block; vertical-align:middle; }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--panel2); border:1px solid var(--red);
    padding:12px 16px; border-radius:10px; font-size:13px; opacity:0; transition:.2s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
  <h1>VN <span>BOOST</span> · Gerenciador de Licenças</h1>

  <!-- Login -->
  <div class="card" id="loginCard">
    <p class="muted" style="margin-bottom:12px">Informe o token de admin para acessar.</p>
    <div class="row">
      <input type="password" id="token" placeholder="ADMIN_TOKEN" style="flex:1;min-width:240px" />
      <button class="btn-primary" id="loginBtn">Entrar</button>
    </div>
    <p class="muted" id="loginErr" style="color:var(--red2);margin-top:10px"></p>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="card">
      <b style="font-size:14px">Criar nova chave</b>
      <div class="row" style="margin-top:14px">
        <input id="cNote" placeholder="Nota (ex: cliente João)" style="flex:1;min-width:200px" />
        <select id="cPlan">
          <option value="standard">standard</option>
          <option value="vip">vip</option>
          <option value="lifetime">lifetime</option>
        </select>
        <input id="cDays" type="number" min="0" placeholder="Dias (vazio = sem expirar)" style="width:200px" />
        <button class="btn-primary" id="createBtn">Gerar chave</button>
      </div>
      <p class="muted" style="margin-top:10px">A chave nasce solta e vincula no 1º uso ao HWID do cliente.</p>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <b style="font-size:14px">Licenças</b>
        <button id="refreshBtn">Atualizar</button>
      </div>
      <table>
        <thead><tr>
          <th>Chave</th><th>Status</th><th>HWID</th><th>Nota</th><th>Plano</th><th>Expira</th><th>Último acesso</th><th>Ações</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const $ = (s)=>document.querySelector(s);
let TOKEN = sessionStorage.getItem("vn_admin_token") || "";

function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
async function api(path, opts={}){
  const r = await fetch(path, { ...opts, headers:{ "Content-Type":"application/json", "x-admin-token":TOKEN, ...(opts.headers||{}) } });
  if(r.status===401){ logout(); throw new Error("Não autorizado"); }
  return r.json();
}
function fmt(d){ return d ? new Date(d).toLocaleString() : "—"; }
function statusTag(l){
  if(l.status==="revoked") return '<span class="tag tag-revoked">revogada</span>';
  if(!l.hwid) return '<span class="tag tag-unbound">não usada</span>';
  return '<span class="tag tag-active">ativa</span>';
}

async function load(){
  const d = await api("/api/admin/keys");
  const tb = $("#rows"); tb.innerHTML="";
  (d.licenses||[]).forEach(l=>{
    const tr=document.createElement("tr");
    tr.innerHTML = `
      <td><code>${l.key}</code></td>
      <td>${statusTag(l)}</td>
      <td>${l.hwid ? `<span class="hwid" title="${l.hwid}">${l.hwid}</span>` : "—"}</td>
      <td>${l.note||"—"}</td>
      <td>${l.plan||"—"}</td>
      <td>${l.expires_at?fmt(l.expires_at):"nunca"}</td>
      <td>${fmt(l.last_seen)}</td>
      <td class="actions">
        <button onclick="copyKey('${l.key}')">Copiar</button>
        ${l.status==="revoked"
          ? `<button onclick="act(${l.id},'restore')">Restaurar</button>`
          : `<button onclick="act(${l.id},'revoke')">Revogar</button>`}
        <button onclick="act(${l.id},'unbind')">Desvincular</button>
        <button onclick="del(${l.id})">Excluir</button>
      </td>`;
    tb.appendChild(tr);
  });
}
window.copyKey=(k)=>{ navigator.clipboard.writeText(k); toast("Chave copiada"); };
window.act=async(id,action)=>{ await api(`/api/admin/keys/${id}/${action}`,{method:"POST"}); toast("Feito"); load(); };
window.del=async(id)=>{ if(!confirm("Excluir esta licença?"))return; await api(`/api/admin/keys/${id}`,{method:"DELETE"}); toast("Excluída"); load(); };

$("#createBtn").addEventListener("click", async ()=>{
  const note=$("#cNote").value.trim();
  const plan=$("#cPlan").value;
  const days=parseInt($("#cDays").value,10);
  let expiresAt=null;
  if(days>0){ const d=new Date(); d.setDate(d.getDate()+days); expiresAt=d.toISOString(); }
  const r=await api("/api/admin/keys",{method:"POST",body:JSON.stringify({note,plan,expiresAt})});
  if(r.ok){ $("#cNote").value=""; $("#cDays").value=""; toast("Chave: "+r.license.key); load(); }
});
$("#refreshBtn").addEventListener("click", load);

function showApp(){ $("#loginCard").classList.add("hidden"); $("#app").classList.remove("hidden"); load(); }
function logout(){ sessionStorage.removeItem("vn_admin_token"); TOKEN=""; $("#app").classList.add("hidden"); $("#loginCard").classList.remove("hidden"); }
$("#loginBtn").addEventListener("click", async ()=>{
  TOKEN=$("#token").value.trim();
  try{ const d=await api("/api/admin/keys"); if(d.ok){ sessionStorage.setItem("vn_admin_token",TOKEN); showApp(); } }
  catch(e){ $("#loginErr").textContent="Token inválido."; }
});

if(TOKEN){ showApp(); }
</script>
</body>
</html>
